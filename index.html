<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Экзамен по таджвиду · Первый уровень</title>
  <meta name="description" content="Экзамен по таджвиду, первый уровень. Проверьте свой уровень знаний или запишитесь на уроки чтения Корана. Преподаватель Деаб Анас Т.">
  <meta property="og:title" content="Экзамен по таджвиду · Первый уровень">
  <meta property="og:description" content="Проверьте свой уровень знаний таджвида или запишитесь на уроки.">
  <meta name="theme-color" content="#FFFFFF">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23FFFFFF'/%3E%3Cpath d='M6 6h52v52H6z' fill='none' stroke='%230A0A0B' stroke-opacity='.45' stroke-width='1'/%3E%3Ctext x='32' y='45' font-size='34' text-anchor='middle' fill='%230A0A0B' font-family='Georgia,serif'%3E%D8%AA%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script>
    /* Тема ставится до отрисовки, иначе моргает при загрузке.
       По умолчанию — белый бланк; тёмная включается только явно. */
    (function () {
      var theme = 'light';
      try {
        if (localStorage.getItem('tajweed_theme') === 'dark') theme = 'dark';
      } catch (e) { /* приватный режим — остаётся белая */ }
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', '#0A0A0B');
      }
    })();
  </script>
</head>
<body>

  <a class="skip-link" href="#app">Перейти к содержанию</a>

  <!-- Чертёжный каркас страницы: приводные метки и штриховка по углам -->
  <div class="marks is-page" aria-hidden="true">
    <span class="tick tl-v"></span><span class="tick tl-h"></span>
    <span class="tick tr-v"></span><span class="tick tr-h"></span>
    <span class="tick bl-v"></span><span class="tick bl-h"></span>
    <span class="tick br-v"></span><span class="tick br-h"></span>
    <span class="hatch tr"></span><span class="hatch bl"></span>
  </div>

  <header class="sitenav" id="sitenav">
    <div class="sitenav-inner">
      <button class="sitenav-mark" id="navHome" type="button">таджвид.рф</button>
      <div class="sitenav-right">
        <div class="sitenav-tabs" id="sitenavTabs"></div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false">
          <span class="theme-dial" aria-hidden="true"></span>
          <span class="theme-label" id="themeLabel">Тёмная</span>
        </button>
      </div>
    </div>
  </header>

  <header class="topbar" id="topbar" hidden>
    <div class="topbar-inner">
      <span class="topbar-label" id="topbarLabel"></span>
      <span class="topbar-right">
        <span class="topbar-timer" id="topbarTimer" role="timer" aria-label="Осталось времени" hidden></span>
        <button class="btn is-quiet topbar-exit" id="examExit" type="button" hidden>Выйти</button>
      </span>
    </div>
    <progress class="timebar" id="timebar" aria-label="Оставшееся время" max="180" value="180" hidden>180 секунд</progress>
  </header>

  <p class="visually-hidden" id="timeAlert" role="status" aria-live="assertive"></p>

  <div class="sheet-wrap">
    <div class="sheet-nodes" aria-hidden="true">
      <span class="n-tl"></span><span class="n-tr"></span>
      <span class="n-bl"></span><span class="n-br"></span>
    </div>
    <main class="sheet" id="app" tabindex="-1"></main>
  </div>

  <nav class="tabbar" id="tabbar" aria-label="Разделы сайта"></nav>

  <footer class="pagefoot">
    <span>таджвид.рф</span>
    <span>Преподаватель: Деаб Анас Т.</span>
  </footer>

  <noscript>
    <div class="noscript">Для прохождения экзамена включите JavaScript. Записаться на занятия можно через <a href="https://tajweed-backend-production.up.railway.app/apply-form">обычную HTML-форму</a>.</div>
  </noscript>

  <script src="assets/config.js"></script>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
